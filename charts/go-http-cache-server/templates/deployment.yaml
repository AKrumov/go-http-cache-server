apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "go-http-cache-server.fullname" . }}
  labels:
    {{- include "go-http-cache-server.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "go-http-cache-server.fullname" . }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  updateStrategy:
    type: RollingUpdate
  podManagementPolicy: Parallel   # Start all pods at once (cache servers are independent)
  selector:
    matchLabels:
      {{- include "go-http-cache-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "go-http-cache-server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "go-http-cache-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "go-http-cache-server.name" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.config.debugListen }}
            - name: debug
              containerPort: 6060
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "go-http-cache-server.fullname" . }}-config
            {{- if or .Values.secret.create .Values.secret.name }}
            - secretRef:
                name: {{ include "go-http-cache-server.secretName" . }}
                optional: true
            {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- if or .Values.persistence.enabled .Values.tls.enabled }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: cache-data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /app/tls
              readOnly: true
            {{- end }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: cache-data
        labels:
          {{- include "go-http-cache-server.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        {{- with .Values.persistence.mountOptions }}
        mountOptions:
          {{- toYaml . | nindent 10 }}
        {{- end }}
  {{- end }}
