apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-http-cache-server.fullname" . }}
  labels:
    {{- include "go-http-cache-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.config.debugListen }}
    - port: 6060
      targetPort: debug
      protocol: TCP
      name: debug
    {{- end }}
  selector:
    {{- include "go-http-cache-server.selectorLabels" . | nindent 4 }}
