replicaCount: 2

image:
  repository: ghcr.io/akrumov/go-http-cache-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80

config:
  storageType: s3
  localDir: /app/cache-data
  s3Bucket: my-gradle-cache
  s3Prefix: gradle-cache
  s3Region: us-east-1
  s3Endpoint: ""
  s3Concurrency: 0
  maxUploadSize: ""
  localTTL: ""
  localCleanupInterval: ""

secret:
  create: true
  name: ""
  data:
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
    AWS_SESSION_TOKEN: ""
    AUTH_USERNAME: ""
    AUTH_PASSWORD: ""

args: []

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: 1000m

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

persistence:
  enabled: false
  mountPath: /app/cache-data
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  # Mount options for the cache volume. strictatime is required for accurate
  # local-cache TTL eviction when using local or hybrid storage.
  mountOptions:
    - strictatime

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}
