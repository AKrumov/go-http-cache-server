---
# Namespace for the Gradle cache server
apiVersion: v1
kind: Namespace
metadata:
  name: gradle-cache

---
# ServiceAccount with optional IRSA support for S3 access.
# If using IAM Roles for Service Accounts (recommended on EKS),
# uncomment and set the eks.amazonaws.com/role-arn annotation.
# If using static AWS credentials, use the Secret below instead.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gradle-cache
  namespace: gradle-cache
  annotations:
    # eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/GradleCacheS3Role

---
# ConfigMap: non-sensitive configuration.
# Change these values to match your environment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gradle-cache-config
  namespace: gradle-cache
data:
  # Storage backend: "local" or "s3"
  STORAGE_TYPE: "s3"

  # Local storage directory (used when STORAGE_TYPE=local)
  LOCAL_DIR: "/app/cache-data"

  # S3 settings (used when STORAGE_TYPE=s3)
  S3_BUCKET: "my-gradle-cache"
  S3_PREFIX: "gradle-cache"
  S3_REGION: "us-east-1"
  # Leave S3_ENDPOINT empty for real AWS S3.
  # Set to a URL like "http://minio.minio.svc.cluster.local:9000" for MinIO inside the cluster.
  S3_ENDPOINT: ""

---
# Secret: sensitive configuration.
# Only required if you are NOT using IRSA for S3 access.
# If using IRSA, you can omit this Secret and remove its reference from the Deployment.
# Base64-encode your values: echo -n 'YOUR_VALUE' | base64
apiVersion: v1
kind: Secret
metadata:
  name: gradle-cache-secrets
  namespace: gradle-cache
type: Opaque
stringData:
  # AWS credentials (only needed without IRSA)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  # Uncomment if using temporary credentials (e.g. SSO)
  # AWS_SESSION_TOKEN: ""

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gradle-cache
  namespace: gradle-cache
  labels:
    app: gradle-cache
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gradle-cache
  template:
    metadata:
      labels:
        app: gradle-cache
    spec:
      serviceAccountName: gradle-cache
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: gradle-cache
          image: go-gradle-cache:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gradle-cache-config
            # Remove the following block if you are not using static AWS credentials.
            - secretRef:
                name: gradle-cache-secrets
                optional: true
          # Command-line flags can be added here if needed.
          # args:
          #   - "-listen=:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Local cache persistence (only needed when STORAGE_TYPE=local)
          # volumeMounts:
          #   - name: cache-data
          #     mountPath: /app/cache-data
      # volumes:
      #   - name: cache-data
      #     emptyDir: {}
      #     # OR use a PersistentVolumeClaim for shared/durable local storage:
      #     # persistentVolumeClaim:
      #     #   claimName: gradle-cache-pvc

---
# Service: exposes the cache server inside the cluster.
# Change type to LoadBalancer if you need direct external access without an Ingress.
apiVersion: v1
kind: Service
metadata:
  name: gradle-cache
  namespace: gradle-cache
  labels:
    app: gradle-cache
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: gradle-cache

---
# HorizontalPodAutoscaler: automatically scale based on CPU usage.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gradle-cache
  namespace: gradle-cache
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gradle-cache
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
