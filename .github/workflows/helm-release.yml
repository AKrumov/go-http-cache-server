name: Helm Chart Release

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - ".github/workflows/helm-release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Package and publish Helm chart to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/go-http-cache-server

      - name: Package chart
        run: helm package charts/go-http-cache-server --destination .

      - name: Log in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push go-http-cache-server-*.tgz "oci://ghcr.io/$OWNER"